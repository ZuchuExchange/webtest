<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Request</title>
</head>
<body>
  <h2>Request Payment</h2>
  <form id="paymentForm" action="/pay" method="POST">
    <input type="hidden" name="CallBackURL" value="https://server222-y4od.onrender.com/callback" />

    <label for="phone">Phone Number:</label><br/>
    <input type="text" id="phone" name="phoneNumber" value="0757022046" required /><br/><br/>

    <label for="amount">Amount (Ksh):</label><br/>
    <input type="number" id="amount" name="amount" value="1" required /><br/><br/>

    <button type="submit">Request Payment</button>
  </form>

  <script>
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = new FormData(this);
      fetch(this.action, {
        method: 'POST',
        body: new URLSearchParams(formData)
      })
      .then(response => response.json())
      .then(data => {
        alert('Payment request sent! Check your phone.');
        console.log(data);
      })
      .catch(error => {
        alert('Error sending payment request.');
        console.error(error);
      });
    });
  </script>
</body>
  </html>
