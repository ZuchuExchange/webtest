<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Request</title>
  <style>
    /* Basic styling for popup overlay */
    #popupOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #popupBox {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .spinner {
      border: 4px solid #eee;
      border-top: 4px solid #0a6ebd;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      margin: 10px auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h2>Request Payment</h2>
  <form id="paymentForm" action="https://server222-y4od.onrender.com/pay" method="POST">
    <input type="hidden" name="CallBackURL" value="https://server222-y4od.onrender.com" />

    <label for="phone">Phone Number:</label><br/>
    <input type="text" id="phone" name="phoneNumber" value="0757022046" required /><br/><br/>

    <label for="amount">Amount (Ksh):</label><br/>
    <input type="number" id="amount" name="amount" value="1" required /><br/><br/>

    <button type="submit">Request Payment</button>
  </form>

  <!-- Popup overlay for status messages -->
  <div id="popupOverlay" aria-hidden="true">
    <div id="popupBox" role="dialog" aria-modal="true">
      <h3 id="popupTitle">Processing...</h3>
      <div id="popupSpinner" class="spinner"></div>
      <p id="popupMessage"></p>
      <button id="popupOk" style="display:none;">OK</button>
    </div>
  </div>

  <script>
    const popupOverlay = document.getElementById('popupOverlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupMessage = document.getElementById('popupMessage');
    const popupOk = document.getElementById('popupOk');

    function showPopup(title, message, showSpinner=false, showOk=false) {
      popupTitle.textContent = title;
      popupMessage.innerHTML = message;
      document.getElementById('popupSpinner').style.display = showSpinner ? 'block' : 'none';
      popupOk.style.display = showOk ? 'inline-block' : 'none';
      popupOverlay.style.display = 'flex';
      popupOverlay.setAttribute('aria-hidden', 'false');
    }

    function hidePopup() {
      popupOverlay.style.display = 'none';
      popupOverlay.setAttribute('aria-hidden', 'true');
    }

    document.getElementById('popupOk').addEventListener('click', hidePopup);

    document.getElementById('paymentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Show processing popup
      showPopup('Processing Payment', 'Contacting payment server...', true, false);

      // Collect data from form inputs
      const data = {
        CallBackURL: "https://server222-y4od.onrender.com",
        phoneNumber: document.getElementById('phone').value,
        amount: parseFloat(document.getElementById('amount').value)
      };

      fetch(this.action, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(data => {
        if (data.success && data.reference) {
          showPopup('Payment Initiated', 'Payment request sent! Check your phone.', false, true);
          // Start polling for status
          pollPaymentStatus(data.reference);
        } else {
          showPopup('Error', data.message || 'Failed to initiate payment.', false, true);
        }
      })
      .catch(error => {
        showPopup('Error', 'Failed to contact server. Please try again.', false, true);
        console.error(error);
      });
    });

    function pollPaymentStatus(reference) {
      let attempts = 0;
      const maxAttempts = 60; // e.g., poll for 5 minutes
      const interval = 5000; // 5 seconds
      showPopup('Waiting for Payment', 'Waiting for confirmation...', false, false);

      const intervalId = setInterval(() => {
        attempts++;
        if (attempts > maxAttempts) {
          clearInterval(intervalId);
          showPopup('Timeout', 'Payment confirmation not received. Please check later.', false, true);
          return;
        }
        fetch(`/receipt/${encodeURIComponent(reference)}`)
          .then(res => res.json())
          .then(data => {
            if (data.receipt && data.receipt.status !== 'pending') {
              clearInterval(intervalId);
              if (['success', 'completed', 'paid'].includes(data.receipt.status)) {
                showPopup('Payment Successful', 'Your payment has been confirmed.', false, true);
              } else {
                showPopup('Payment Failed', 'Payment was canceled or failed.', false, true);
              }
            }
          })
          .catch(err => {
            console.error('Polling error:', err);
          });
      }, interval);
    }
  </script>
</body>
</html>
